<html lang="en">
<head>

<meta name="theme-color" content="#000000">


</head>
<body>
    
    <center>
    <div id = "PATIENTBOX">
        <h1>Enter Patient Name</h1>
        <input type="text" id = "patient" placeholder="Patient Name">

        <h1>Enter Doctor Name</h1>

    <div id = "BPBOX">
        <h1>Enter BP1</h1>

    <div id="Results">

    </div>

    <div id = "BPBOX">
        <h1>Enter BP2</h1>

    </div>
    <br>
    <button type = "submit" id="submit" onclick="check()" class="btn btn-danger">Submit</button>
    <div id="Results">

    </div>
    </center>

    <script>

        function check(){
            let BP1 = document.getElementById("BP1").value;
            let Patient = document.getElementById("patient").value;
            let Doctor = document.getElementById("Doctor").value;

            if (BP1 >= 5){
                document.getElementById("Results").innerHTML = "<h2>You are Diabetic</h2>";
            }
            else if (BP1 <= 5){
                document.getElementById("Results").innerHTML = "<h2>You are Normal</h2>";
            }
        }
        if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('Service Worker registered!', reg.scope))
      .catch(err => console.log('Registration failed:', err));
  });
}


</script>
